<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BartOriginalSport</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
  :root {
    --bg: #17212b;
    --bg2: #1e2c3a;
    --bg3: #242f3d;
    --card: #1e2c3a;
    --border: #2b3a4a;
    --blue: #2196f3;
    --blue-bright: #1e88e5;
    --blue-glow: rgba(33,150,243,0.25);
    --text: #e8f1f8;
    --text2: #8fa5b8;
    --text3: #5c7a96;
    --green: #4caf50;
    --red: #ef5350;
    --nav-h: 64px;
    --header-h: 58px;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; background:var(--bg); color:var(--text); font-family:'Nunito',sans-serif; overflow:hidden; }

  #app { display:flex; flex-direction:column; height:100%; height:100dvh; position:relative; overflow:hidden; }

  @media (min-width: 600px) {
    html, body { background: #0f1923; overflow:hidden; }
    #app { max-width:480px; margin:0 auto; box-shadow: 0 0 80px rgba(0,0,0,.6); }
  }

  .header {
    height: var(--header-h); min-height:var(--header-h);
    background: var(--bg2);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px;
    border-bottom: 1px solid var(--border);
    position: relative; z-index: 10;
  }
  .header-back {
    width:36px; height:36px; border-radius:50%; background:var(--bg3);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; border:none; color:var(--blue);
    transition: background .15s;
  }
  .header-back:active { background:var(--border); }
  .header-title { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:1.5px; color:var(--text); }
  .header-logo {
    font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:2px;
    background: linear-gradient(135deg, #2196f3, #64b5f6);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  }
  .header-right { width:36px; display:flex; justify-content:flex-end; }

  .pages { flex:1; overflow:hidden; position:relative; min-height:0; }
  .page { position:absolute; inset:0; overflow-y:auto; transition: transform .28s cubic-bezier(.4,0,.2,1), opacity .28s; }
  .page.hidden { pointer-events:none; opacity:0; }
  .page#page-detail { transform: translateX(100%); opacity: 0; z-index: 5; background: var(--bg); }
  .page#page-detail.open { transform: translateX(0); opacity: 1; }

  .bottom-nav { height: var(--nav-h); min-height:var(--nav-h); background: var(--bg2); border-top: 1px solid var(--border); display: flex; z-index: 20; flex-shrink:0; }
  .nav-tab {
    flex: 1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px;
    cursor:pointer; position:relative; transition: color .15s;
    color: var(--text3); border:none; background:none;
    font-family:'Nunito',sans-serif; font-size:11px; font-weight:700; letter-spacing:.3px;
  }
  .nav-tab.active { color: var(--blue); }
  .nav-tab svg { width:22px; height:22px; }
  .cart-badge {
    position:absolute; top:8px; right:calc(50% - 18px);
    background:var(--blue); color:#fff;
    font-size:10px; font-weight:800; line-height:1;
    min-width:17px; height:17px; border-radius:9px;
    display:flex; align-items:center; justify-content:center; padding: 0 4px;
    border: 2px solid var(--bg2);
    transform: scale(0); transition: transform .2s cubic-bezier(.34,1.56,.64,1);
  }
  .cart-badge.show { transform: scale(1); }

  .filter-bar { padding: 12px 16px 8px; display:flex; gap:8px; overflow-x:auto; scrollbar-width:none; }
  .filter-bar::-webkit-scrollbar { display:none; }
  .filter-chip {
    white-space:nowrap; padding:6px 14px; border-radius:20px; border:1px solid var(--border);
    background:var(--bg3); color:var(--text2);
    font-family:'Nunito',sans-serif; font-size:13px; font-weight:700;
    cursor:pointer; transition:all .15s; flex-shrink:0;
  }
  .filter-chip.active { background:var(--blue); color:#fff; border-color:var(--blue); }

  .products-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:8px 12px 80px; }

  .product-card {
    background:var(--card); border-radius:14px; overflow:hidden; cursor:pointer;
    border: 1px solid var(--border); transition: transform .15s, box-shadow .15s; position:relative;
    animation: fadeUp .3s ease both;
  }
  .product-card:active { transform:scale(.97); }
  .product-card-img { width:100%; aspect-ratio:1/1; object-fit:cover; background:var(--bg3); display:block; }
  .product-card-img-placeholder {
    width:100%; aspect-ratio:1/1;
    background: linear-gradient(135deg, var(--bg3) 0%, var(--border) 100%);
    display:flex; align-items:center; justify-content:center; color:var(--text3); font-size:32px;
  }
  .product-card-body { padding:10px 10px 12px; }
  .product-card-brand { font-size:10px; font-weight:700; color:var(--blue); text-transform:uppercase; letter-spacing:.8px; margin-bottom:3px; }
  .product-card-name { font-size:13px; font-weight:700; color:var(--text); line-height:1.3; margin-bottom:6px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .product-card-price { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:.5px; color:var(--text); margin-bottom:8px; }
  .product-card-price span { color:var(--text2); font-size:12px; font-family:'Nunito',sans-serif; font-weight:600; }
  .card-sizes { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:8px; }
  .card-size-chip {
    font-size:10px; font-weight:700; padding:2px 6px; border-radius:6px;
    border:1px solid var(--border); background:var(--bg3); color:var(--text2);
    cursor:pointer; transition:all .12s;
  }
  .card-size-chip.selected { background:var(--blue); border-color:var(--blue); color:#fff; }
  .btn-add {
    width:100%; padding:8px; background:var(--blue); color:#fff; border:none; border-radius:10px;
    font-family:'Nunito',sans-serif; font-size:13px; font-weight:800;
    cursor:pointer; transition:all .15s; display:flex; align-items:center; justify-content:center; gap:5px;
  }
  .btn-add:active { background:var(--blue-bright); transform:scale(.97); }
  .btn-add.added { background: var(--green); animation: addPulse .3s ease; }
  @keyframes addPulse { 0%{transform:scale(1)} 50%{transform:scale(1.05)} 100%{transform:scale(1)} }

  /* DETAIL */
  .detail-imgs { position:relative; overflow:hidden; background:var(--bg3); }
  .detail-imgs-scroll { display:flex; overflow-x:auto; scrollbar-width:none; scroll-snap-type:x mandatory; }
  .detail-imgs-scroll::-webkit-scrollbar { display:none; }
  .detail-img-slide { min-width:100%; scroll-snap-align:start; }
  .detail-img-slide img { width:100%; aspect-ratio:1/1; object-fit:cover; display:block; }
  .detail-dots { position:absolute; bottom:10px; left:50%; transform:translateX(-50%); display:flex; gap:6px; }
  .detail-dot { width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,.4); transition:all .2s; }
  .detail-dot.active { background:#fff; width:18px; border-radius:3px; }
  .detail-info { padding:20px 16px 100px; }
  .detail-brand { font-size:12px; font-weight:700; color:var(--blue); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
  .detail-name { font-size:20px; font-weight:800; line-height:1.25; color:var(--text); margin-bottom:4px; }
  .detail-meta { display:flex; flex-wrap:wrap; gap:8px; margin:10px 0 16px; }
  .detail-tag { padding:4px 10px; border-radius:8px; background:var(--bg3); border:1px solid var(--border); font-size:11px; font-weight:700; color:var(--text2); }
  .detail-price-row { display:flex; align-items:baseline; gap:8px; margin-bottom:18px; }
  .detail-price { font-family:'Bebas Neue',sans-serif; font-size:32px; color:var(--text); }
  .detail-price-curr { font-size:16px; color:var(--text2); font-family:'Nunito',sans-serif; font-weight:600; }
  .detail-section-label { font-size:12px; font-weight:800; color:var(--text2); text-transform:uppercase; letter-spacing:.8px; margin-bottom:10px; }
  .detail-sizes { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:20px; }
  .detail-size-btn {
    min-width:48px; height:40px; border-radius:10px; border:1.5px solid var(--border);
    background:var(--bg3); color:var(--text);
    font-family:'Nunito',sans-serif; font-size:14px; font-weight:800;
    cursor:pointer; transition:all .15s; display:flex; align-items:center; justify-content:center; padding:0 10px;
  }
  .detail-size-btn.selected { background:var(--blue); border-color:var(--blue); color:#fff; box-shadow:0 0 0 3px var(--blue-glow); }
  .detail-material { margin-bottom:20px; }
  .detail-material p { font-size:14px; font-weight:600; color:var(--text2); line-height:1.6; }
  .detail-btn-add {
    width:100%; padding:15px; background:var(--blue); color:#fff; border:none; border-radius:14px;
    font-family:'Nunito',sans-serif; font-size:16px; font-weight:800;
    cursor:pointer; transition:all .15s; display:flex; align-items:center; justify-content:center; gap:8px;
    box-shadow: 0 4px 20px var(--blue-glow);
  }
  .detail-btn-add:active { background:var(--blue-bright); }
  .detail-btn-add.added { background:var(--green); }

  /* CART */
  .cart-list { padding:12px 12px 80px; display:flex; flex-direction:column; gap:10px; }
  .cart-item {
    background:var(--card); border-radius:14px; border:1px solid var(--border);
    display:flex; gap:12px; padding:12px; align-items:flex-start;
  }
  .cart-item-img { width:70px; height:70px; border-radius:10px; object-fit:cover; background:var(--bg3); flex-shrink:0; }
  .cart-item-info { flex:1; min-width:0; }
  .cart-item-name { font-size:13px; font-weight:700; line-height:1.3; color:var(--text); margin-bottom:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .cart-item-size { font-size:12px; color:var(--blue); font-weight:700; margin-bottom:6px; }
  .cart-item-price { font-family:'Bebas Neue',sans-serif; font-size:18px; color:var(--text); }
  .cart-item-qty { display:flex; align-items:center; gap:10px; margin-top:8px; }
  .qty-btn {
    width:28px; height:28px; border-radius:8px; background:var(--bg3); border:1px solid var(--border);
    color:var(--text); font-size:16px; font-weight:700;
    display:flex; align-items:center; justify-content:center; cursor:pointer; transition:background .1s;
  }
  .qty-btn:active { background:var(--border); }
  .qty-val { font-size:15px; font-weight:800; color:var(--text); min-width:16px; text-align:center; }
  .cart-item-del { padding:6px; color:var(--text3); cursor:pointer; border:none; background:none; align-self:flex-start; }

  /* CHECKOUT FORM */
  .checkout-form-wrap {
    padding: 16px 12px 0;
  }
  .checkout-form-title {
    font-size:13px; font-weight:800; color:var(--text2);
    text-transform:uppercase; letter-spacing:.8px;
    margin-bottom:12px;
    display:flex; align-items:center; gap:8px;
  }
  .checkout-form-title::before {
    content:''; display:block; width:3px; height:16px;
    background:var(--blue); border-radius:2px;
  }
  .form-row { display:flex; gap:8px; margin-bottom:10px; }
  .form-field { flex:1; display:flex; flex-direction:column; gap:5px; }
  .form-field label { font-size:11px; font-weight:700; color:var(--text3); text-transform:uppercase; letter-spacing:.5px; }
  .form-field input, .form-field textarea {
    background:var(--bg3); border:1.5px solid var(--border);
    border-radius:10px; padding:10px 12px;
    color:var(--text); font-family:'Nunito',sans-serif; font-size:14px; font-weight:600;
    outline:none; transition:border-color .15s;
    width:100%;
  }
  .form-field input::placeholder, .form-field textarea::placeholder { color:var(--text3); }
  .form-field input:focus, .form-field textarea:focus { border-color:var(--blue); }
  .form-field textarea { resize:none; height:72px; }
  .form-field input.error { border-color:var(--red); }

  .cart-footer {
    position:fixed; bottom:var(--nav-h); left:0; right:0;
    background:var(--bg2); border-top:1px solid var(--border); z-index:10;
  }
  .cart-footer-inner { padding:12px 16px; }
  .cart-total-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .cart-total-label { font-size:14px; font-weight:700; color:var(--text2); }
  .cart-total-val { font-family:'Bebas Neue',sans-serif; font-size:22px; color:var(--text); }

  /* TWO BUTTONS */
  .cart-btns { display:flex; gap:8px; }
  .cart-checkout-btn {
    flex:1; padding:13px; background:var(--bg3); color:var(--text2);
    border:1.5px solid var(--border); border-radius:14px;
    font-family:'Nunito',sans-serif; font-size:14px; font-weight:800;
    cursor:pointer; transition:all .15s;
  }
  .cart-checkout-btn:active { background:var(--border); }
  .cart-pay-btn {
    flex:2; padding:13px;
    background: linear-gradient(135deg, #2196f3, #1565c0);
    color:#fff; border:none; border-radius:14px;
    font-family:'Nunito',sans-serif; font-size:15px; font-weight:800;
    cursor:pointer; transition:all .15s;
    box-shadow:0 4px 20px var(--blue-glow);
    display:flex; align-items:center; justify-content:center; gap:7px;
  }
  .cart-pay-btn:active { transform:scale(.97); }
  .cart-pay-btn:disabled { opacity:.6; cursor:not-allowed; transform:none; }
  .cart-pay-btn.sending { background: linear-gradient(135deg, #1565c0, #0d47a1); }

  .cart-empty { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; padding:60px 20px; text-align:center; }
  .cart-empty svg { opacity:.3; }
  .cart-empty p { color:var(--text2); font-size:15px; font-weight:700; }
  .cart-empty small { color:var(--text3); font-size:13px; }

  /* ORDERS */
  .orders-list { padding:12px 12px 80px; display:flex; flex-direction:column; gap:10px; }
  .order-card { background:var(--card); border-radius:14px; border:1px solid var(--border); padding:14px; }
  .order-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .order-num { font-size:14px; font-weight:800; color:var(--text); }
  .order-status { padding:4px 10px; border-radius:8px; font-size:11px; font-weight:800; }
  .order-status.pending { background:rgba(255,152,0,.15); color:#ffa726; }
  .order-status.delivered { background:rgba(76,175,80,.15); color:#66bb6a; }
  .order-date { font-size:12px; color:var(--text3); margin-bottom:8px; }
  .order-items-preview { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px; }
  .order-item-tag { background:var(--bg3); border:1px solid var(--border); border-radius:8px; padding:3px 8px; font-size:12px; color:var(--text2); font-weight:600; }
  .order-total { font-family:'Bebas Neue',sans-serif; font-size:18px; color:var(--text); }
  .orders-empty { padding:60px 20px; text-align:center; display:flex; flex-direction:column; align-items:center; gap:12px; }
  .orders-empty svg { opacity:.3; }
  .orders-empty p { color:var(--text2); font-size:15px; font-weight:700; }

  /* ORDER CUSTOMER INFO */
  .order-customer {
    margin-top:8px; padding-top:8px;
    border-top:1px solid var(--border);
    font-size:12px; color:var(--text3); font-weight:600; line-height:1.7;
  }

  .toast {
    position:fixed; bottom:calc(var(--nav-h) + 12px); left:50%;
    transform:translateX(-50%) translateY(10px);
    background:#1a3a5c; border:1px solid var(--blue);
    color:#fff; padding:10px 18px; border-radius:12px;
    font-size:13px; font-weight:700; white-space:nowrap;
    opacity:0; transition:all .25s; z-index:100;
    pointer-events:none;
    box-shadow:0 4px 20px rgba(33,150,243,.3);
  }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  .toast.error-toast { background:#3a1a1a; border-color:var(--red); }
::-webkit-scrollbar { width:0; height:0; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }

  /* SPINNER */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width:16px; height:16px; border:2px solid rgba(255,255,255,.3);
    border-top-color:#fff; border-radius:50%;
    animation: spin .7s linear infinite;
    display:inline-block;
  }
</style>
</head>
<body>
<div id="app">

  <header class="header" id="main-header">
    <div style="width:36px"></div>
    <div class="header-logo">BartOriginalSport</div>
    <div class="header-right"></div>
  </header>

  <div class="pages">
    <div class="page" id="page-catalog">
      <div class="filter-bar" id="filter-bar"></div>
      <div class="products-grid" id="products-grid"></div>
    </div>
    <div class="page hidden" id="page-cart">
      <div id="cart-content"></div>
    </div>
    <div class="page hidden" id="page-orders">
      <div id="orders-content"></div>
    </div>
    <div class="page" id="page-detail">
      <div id="detail-content"></div>
    </div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-tab active" data-tab="catalog" onclick="switchTab('catalog')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="7" rx="1.5"/>
        <rect x="14" y="3" width="7" height="7" rx="1.5"/>
        <rect x="3" y="14" width="7" height="7" rx="1.5"/>
        <rect x="14" y="14" width="7" height="7" rx="1.5"/>
      </svg>
      Каталог
    </button>
    <button class="nav-tab" data-tab="cart" onclick="switchTab('cart')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
        <path d="M16 10a4 4 0 01-8 0"/>
      </svg>
      <span class="cart-badge" id="cart-badge">0</span>
      Корзина
    </button>
    <button class="nav-tab" data-tab="orders" onclick="switchTab('orders')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 11l3 3L22 4"/>
        <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
      </svg>
      Заказы
    </button>
  </nav>

</div>

<div class="toast" id="toast"></div>

<script>
// ===================== EMAILJS INIT =====================
// EmailJS — бесплатный сервис. Для активации:
// 1. Зарегистрируйтесь на https://www.emailjs.com
// 2. Создайте Email Service (Gmail) и получите Service ID
// 3. Создайте Email Template и получите Template ID
// 4. Скопируйте Public Key
// Вставьте ваши данные ниже:
const EMAILJS_PUBLIC_KEY  = 'YOUR_PUBLIC_KEY';   // <-- вставьте ваш Public Key
const EMAILJS_SERVICE_ID  = 'YOUR_SERVICE_ID';   // <-- вставьте Service ID
const EMAILJS_TEMPLATE_ID = 'YOUR_TEMPLATE_ID';  // <-- вставьте Template ID
const RECIPIENT_EMAIL     = 'multprom34@gmail.com';

// ===================== STATE =====================
let currentFilter = 'Все';
let cart = [];
let orders = [];
let currentTab = 'catalog';
let selectedSizes = {};
let detailProduct = null;
let detailSelectedSize = null;

// ===================== FILTERS =====================
const FILTERS = ['Все','Взуття','Одяг'];

function renderFilters() {
  const bar = document.getElementById('filter-bar');
  bar.innerHTML = FILTERS.map(f => `
    <button class="filter-chip${f===currentFilter?' active':''}" onclick="setFilter('${f}')">${f}</button>
  `).join('');
}
function setFilter(f) { currentFilter=f; renderFilters(); renderGrid(); }

// ===================== GRID =====================
function renderGrid() {
  const grid = document.getElementById('products-grid');
  const filtered = currentFilter==='Все' ? PRODUCTS : PRODUCTS.filter(p=>p.category===currentFilter);
  grid.innerHTML = filtered.map((p,i) => {
    const selSize = selectedSizes[p.id] || (p.sizes[0]||'');
    const inCart = cart.find(c=>c.id===p.id && c.size===selSize);
    return `
    <div class="product-card" style="animation-delay:${i*0.04}s" onclick="openDetail('${p.id}')">
      <img class="product-card-img" src="${p.photo}" alt="${p.name}"
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" loading="lazy">
      <div class="product-card-img-placeholder" style="display:none">👟</div>
      <div class="product-card-body">
        <div class="product-card-brand">${p.brand}</div>
        <div class="product-card-name">${p.name}</div>
        <div class="product-card-price">${p.price.toLocaleString()} <span>грн</span></div>
        <div class="card-sizes" onclick="event.stopPropagation()">
          ${p.sizes.slice(0,4).map(s=>`
            <div class="card-size-chip${s===selSize?' selected':''}"
              onclick="selectCardSize('${p.id}','${s}',event)">${s}</div>
          `).join('')}
          ${p.sizes.length>4?`<div class="card-size-chip">+${p.sizes.length-4}</div>`:''}
        </div>
        <button class="btn-add${inCart?' added':''}" onclick="addToCart('${p.id}',event)" id="add-btn-${p.id}">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
            <line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/>
          </svg>
          ${inCart ? '✓ Добавлено' : 'В корзину'}
        </button>
      </div>
    </div>`;
  }).join('');
}
function selectCardSize(id,size,e) { e.stopPropagation(); selectedSizes[id]=size; renderGrid(); }

// ===================== ADD TO CART =====================
function addToCart(id, e) {
  e.stopPropagation();
  const p = PRODUCTS.find(x=>x.id===id);
  if (!p) return;
  const size = selectedSizes[id] || p.sizes[0] || '';
  const existing = cart.find(c=>c.id===id && c.size===size);
  if (existing) existing.qty++;
  else cart.push({id, size, qty:1, name:p.name, price:p.price, photo:p.photo, brand:p.brand});
  updateCartBadge();
  showToast('Добавлено в корзину');
  const btn = document.getElementById(`add-btn-${id}`);
  if (btn) {
    btn.classList.add('added');
    btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Добавлено`;
  }
}

// ===================== DETAIL PAGE =====================
function openDetail(id) {
  const p = PRODUCTS.find(x=>x.id===id);
  if (!p) return;
  detailProduct = p;
  detailSelectedSize = selectedSizes[id] || p.sizes[0] || '';
  renderDetail();
  document.getElementById('page-detail').classList.add('open');
  document.getElementById('main-header').innerHTML = `
    <button class="header-back" onclick="closeDetail()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="header-title">${p.subcategory}</div>
    <div class="header-right"></div>`;
}
function closeDetail() {
  document.getElementById('page-detail').classList.remove('open');
  setTimeout(() => {
    document.getElementById('main-header').innerHTML = `
      <div style="width:36px"></div>
      <div class="header-logo">BartOriginalSport</div>
      <div class="header-right"></div>`;
  }, 280);
}
function renderDetail() {
  const p = detailProduct;
  const inCart = cart.find(c=>c.id===p.id && c.size===detailSelectedSize);
  const photos = p.photos && p.photos.length ? p.photos : [p.photo];
  document.getElementById('detail-content').innerHTML = `
    <div class="detail-imgs">
      <div class="detail-imgs-scroll" id="detail-scroll" onscroll="updateDots(this,${photos.length})">
        ${photos.map(ph=>`<div class="detail-img-slide"><img src="${ph}" alt="${p.name}" loading="lazy"></div>`).join('')}
      </div>
      ${photos.length>1?`<div class="detail-dots">${photos.map((_,i)=>`<div class="detail-dot${i===0?' active':''}" id="dot-${i}"></div>`).join('')}</div>`:''}
    </div>
    <div class="detail-info">
      <div class="detail-brand">${p.brand} · ${p.subcategory}</div>
      <div class="detail-name">${p.name}</div>
      <div class="detail-meta">
        <span class="detail-tag">${p.gender}</span>
        <span class="detail-tag">${p.season}</span>
        <span class="detail-tag">${p.color}</span>
      </div>
      <div class="detail-price-row">
        <div class="detail-price">${p.price.toLocaleString()}</div>
        <div class="detail-price-curr">грн</div>
      </div>
      <div class="detail-section-label">Выберите размер</div>
      <div class="detail-sizes">
        ${p.sizes.map(s=>`<button class="detail-size-btn${s===detailSelectedSize?' selected':''}" onclick="selectDetailSize('${s}')">${s}</button>`).join('')}
      </div>
      ${p.material&&p.material!=='nan'?`<div class="detail-section-label">Состав</div><div class="detail-material"><p>${p.material}</p></div>`:''}
      <button class="detail-btn-add${inCart?' added':''}" id="detail-add-btn" onclick="addToCartDetail()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          ${inCart?'<polyline points="20 6 9 17 4 12"/>':'<path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/>'}
        </svg>
        ${inCart ? 'В корзине ✓' : 'Добавить в корзину'}
      </button>
    </div>`;
}
function selectDetailSize(s) { detailSelectedSize=s; if(detailProduct) selectedSizes[detailProduct.id]=s; renderDetail(); }
function addToCartDetail() {
  const p=detailProduct; if(!p) return;
  const size=detailSelectedSize||p.sizes[0]||'';
  const existing=cart.find(c=>c.id===p.id&&c.size===size);
  if(existing) existing.qty++; else cart.push({id:p.id,size,qty:1,name:p.name,price:p.price,photo:p.photo,brand:p.brand});
  updateCartBadge(); showToast('Добавлено в корзину'); renderDetail(); renderGrid();
}
function updateDots(el,total) {
  const idx=Math.round(el.scrollLeft/el.offsetWidth);
  for(let i=0;i<total;i++){const d=document.getElementById('dot-'+i);if(d)d.className='detail-dot'+(i===idx?' active':'');}
}

function clearCart() {
  if (!cart.length) return;
  cart = [];
  updateCartBadge(); renderCart(); renderGrid();
}

function changeQty(i,d) { cart[i].qty+=d; if(cart[i].qty<=0) cart.splice(i,1); updateCartBadge(); renderCart(); renderGrid(); }
function removeFromCart(i) { cart.splice(i,1); updateCartBadge(); renderCart(); renderGrid(); }

// ===================== FORM HELPERS =====================
function clearErr(el) { el.classList.remove('error'); }



// ===================== PAY / SEND EMAIL =====================
async function payOrder() {
  if (!cart.length) return;

  // Validate form
  const name     = document.getElementById('f-name')?.value.trim() || '';
  const lastname = document.getElementById('f-lastname')?.value.trim() || '';
  const phone    = document.getElementById('f-phone')?.value.trim() || '';
  const email    = document.getElementById('f-email')?.value.trim() || '';
  const city     = document.getElementById('f-city')?.value.trim() || '';
  const address  = document.getElementById('f-address')?.value.trim() || '';
  const comment  = document.getElementById('f-comment')?.value.trim() || '';

  let hasError = false;
  ['f-name','f-lastname','f-phone','f-city','f-address'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    if (!el.value.trim()) { el.classList.add('error'); hasError=true; }
    else el.classList.remove('error');
  });
  if (hasError) { showToast('⚠ Заполните обязательные поля', true); return; }

  const orderId = '#' + Math.floor(1000+Math.random()*9000);
  const total   = cart.reduce((s,c)=>s+c.price*c.qty,0);

  const itemsText = cart.map(c =>
    `• ${c.name} | Размер: ${c.size} | ${c.qty} шт. | ${(c.price*c.qty).toLocaleString()} грн`
  ).join('\n');

  const btn = document.getElementById('pay-btn');
  if (btn) { btn.disabled=true; btn.classList.add('sending'); btn.innerHTML=`<span class="spinner"></span> Отправка...`; }

  const templateParams = {
    to_email:   RECIPIENT_EMAIL,
    order_id:   orderId,
    customer:   `${name} ${lastname}`,
    phone,
    email:      email || '—',
    city,
    address,
    comment:    comment || '—',
    items:      itemsText,
    total:      total.toLocaleString() + ' грн',
    date:       new Date().toLocaleString('ru',{day:'2-digit',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'}),
  };

  try {
    await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, templateParams);
    // Save order locally
    orders.unshift({
      id: orderId,
      date: new Date().toLocaleDateString('ru',{day:'2-digit',month:'long',year:'numeric'}),
      items: cart.map(c=>c.name.split(' ').slice(0,3).join(' ')+'('+c.size+')'),
      total, status:'pending',
      customer: { name:`${name} ${lastname}`, phone, city, address }
    });
    cart = [];
    updateCartBadge(); renderCart(); renderGrid();
    showToast(`✓ Заказ ${orderId} оформлен!`);
    setTimeout(()=>switchTab('orders'), 900);
  } catch(err) {
    console.error('EmailJS error:', err);
    // --- DEMO FALLBACK: если EmailJS не настроен, всё равно оформляем заказ ---
    orders.unshift({
      id: orderId,
      date: new Date().toLocaleDateString('ru',{day:'2-digit',month:'long',year:'numeric'}),
      items: cart.map(c=>c.name.split(' ').slice(0,3).join(' ')+'('+c.size+')'),
      total, status:'pending',
      customer: { name:`${name} ${lastname}`, phone, city, address }
    });
    cart = [];
    updateCartBadge(); renderCart(); renderGrid();
    showToast(`✓ Заказ ${orderId} создан (демо-режим)`);
    setTimeout(()=>switchTab('orders'), 900);
  } finally {
    if (btn) { btn.disabled=false; btn.classList.remove('sending'); }
  }
}

}

// ===================== NAV =====================
function switchTab(tab) {
  document.getElementById('page-detail').classList.remove('open');
  ['catalog','cart','orders'].forEach(t => {
    document.getElementById('page-'+t).classList.toggle('hidden', t!==tab);
    document.querySelector(`[data-tab="${t}"]`).classList.toggle('active', t===tab);
  });
  const titles = {catalog:'', cart:'Корзина', orders:'Мои заказы'};
  if (tab==='catalog') {
    document.getElementById('main-header').innerHTML = `<div style="width:36px"></div><div class="header-logo">BartOriginalSport</div><div class="header-right"></div>`;
  } else {
    document.getElementById('main-header').innerHTML = `<div style="width:36px"></div><div class="header-title">${titles[tab]}</div><div class="header-right"></div>`;
  }
  currentTab = tab;
  if (tab==='cart') renderCart();
  if (tab==='orders') renderOrders();
}

// ===================== BADGE =====================
function updateCartBadge() {
  const total = cart.reduce((s,c)=>s+c.qty,0);
  const badge = document.getElementById('cart-badge');
  badge.textContent = total;
  badge.classList.toggle('show', total>0);
}

// ===================== TOAST =====================
let toastTimer;
function showToast(msg, isError=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError?' error-toast':'');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'),2500);
}

// ===================== INIT =====================
renderFilters();
renderGrid();
</script>
